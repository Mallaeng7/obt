version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rustplusbot-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rustplus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rustplus_pass}
      POSTGRES_DB: ${POSTGRES_DB:-rustplusbot}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: rustplusbot-bot
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/rustplusbot
    ports:
      - "3001:3001"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rustplusbot-web
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - bot

  nginx:
    image: nginx:alpine
    container_name: rustplusbot-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - bot

volumes:
  db_data:
