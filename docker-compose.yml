version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rustplusbot-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rustplus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rustplus_pass}
      POSTGRES_DB: ${POSTGRES_DB:-rustplusbot}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rustplus_user} -d ${POSTGRES_DB:-rustplusbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: rustplusbot-bot
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rustplus_user}:${POSTGRES_PASSWORD:-rustplus_pass}@db:5432/${POSTGRES_DB:-rustplusbot}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rustplusbot-web
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rustplus_user}:${POSTGRES_PASSWORD:-rustplus_pass}@db:5432/${POSTGRES_DB:-rustplusbot}
    depends_on:
      - bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: rustplusbot-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  db_data:
