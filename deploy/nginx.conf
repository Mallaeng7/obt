server {
    listen 80;
    server_name _;

    # Docker 내장 DNS - upstream hostname을 동적으로 해석
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Next.js 인증 API → web (3000) 으로 라우팅 (bot보다 먼저 선언해야 함)
    location /api/auth/ {
        set $web_upstream http://web:3000;
        proxy_pass $web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot REST API → bot (3001)
    location /api/ {
        set $bot_upstream http://bot:3001;
        proxy_pass $bot_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket → bot (3001)
    location /socket.io/ {
        set $bot_upstream http://bot:3001;
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Web UI → web (3000)
    location / {
        set $web_upstream http://web:3000;
        proxy_pass $web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
